name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets
        run: |
          mkdir -p www
          cp index.html logo.png www/

      - name: Add Android platform
        run: npx cap add android

      - name: Add Android platform
        run: npx cap add android

      - name: Set app icon
        run: |
          SIZES="mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192"
          for entry in $SIZES; do
            density="${entry%%:*}"
            size="${entry##*:}"
            convert assets/logo.png -resize ${size}x${size} android/app/src/main/res/mipmap-${density}/ic_launcher.png
            convert assets/logo.png -resize ${size}x${size} android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/khristian-labu.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: khristian-labu-apk
          path: android/app/build/outputs/apk/debug/khristian-labu.apk

      - name: Generate changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          if [ -z "$PREV" ]; then
            git log --oneline --no-decorate | head -50 >> $GITHUB_OUTPUT
          else
            git log --oneline --no-decorate $PREV..HEAD >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: android/app/build/outputs/apk/debug/khristian-labu.apk
