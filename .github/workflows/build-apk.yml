name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          npm ci
          sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Sync web assets
        run: |
          mkdir -p www
          cp index.html logo.png www/

      - name: Add Android platform
        run: npx cap add android

      - name: Configure signing
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/khristian-labu.keystore
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=khristian-labu.keystore
          EOF
          sed -i 's/^          //g' android/key.properties
          sed -i 's|def keystorePropertiesFile = rootProject.file("key.properties")|def keystorePropertiesFile = rootProject.file("key.properties")\n    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))|' android/app/build.gradle || true

      - name: Inject signing config
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          cat > android/app/signing.gradle <<'GRADLE'
          android {
              signingConfigs {
                  release {
                      storeFile file("khristian-labu.keystore")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE

          # Append signing config to build.gradle if not already present
          if ! grep -q "signingConfigs" android/app/build.gradle; then
            echo "" >> android/app/build.gradle
            cat android/app/signing.gradle >> android/app/build.gradle
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set app icon
        run: |
          SIZES="mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192"
          for entry in $SIZES; do
            density="${entry%%:*}"
            size="${entry##*:}"
            convert assets/logo.png -resize ${size}x${size} android/app/src/main/res/mipmap-${density}/ic_launcher.png
            convert assets/logo.png -resize ${size}x${size} android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
            convert assets/logo.png -resize ${size}x${size} android/app/src/main/res/mipmap-${density}/ic_launcher_foreground.png
          done
          # Also replace adaptive icon foreground for anydpi-v26
          if [ -d android/app/src/main/res/mipmap-anydpi-v26 ]; then
            convert assets/logo.png -resize 432x432 android/app/src/main/res/drawable/ic_launcher_foreground.png 2>/dev/null || true
          fi
          # Remove anydpi adaptive XML so PNG icons are used directly
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          if [ -f key.properties ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Rename APK
        run: |
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/khristian-labu.apk
          else
            mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/khristian-labu.apk
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: khristian-labu-apk
          path: |
            android/app/build/outputs/apk/release/khristian-labu.apk
            android/app/build/outputs/apk/debug/khristian-labu.apk

      - name: Generate changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          if [ -z "$PREV" ]; then
            git log --oneline --no-decorate | head -50 >> $GITHUB_OUTPUT
          else
            git log --oneline --no-decorate $PREV..HEAD >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            android/app/build/outputs/apk/release/khristian-labu.apk
            android/app/build/outputs/apk/debug/khristian-labu.apk
